<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz de Français B2 - Déménagement & Entraide</title>
    <style>
        :root {
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --text: #2d3436;
            --accent: #6c5ce7;
            --border: #dfe6e9;
            --success: #00b894;
            --error: #d63031;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        #quiz-container {
            width: 90%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
        }

        .progress {
            font-size: 0.9rem;
            color: #b2bec3;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        h2 {
            margin-bottom: 2rem;
            font-weight: 500;
            line-height: 1.4;
        }

        .options {
            display: grid;
            gap: 12px;
        }

        button {
            background: none;
            border: 2px solid var(--border);
            padding: 15px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s ease;
            text-align: left;
            color: var(--text);
        }

        button:hover:not(:disabled) {
            border-color: var(--accent);
            background-color: #f0eeff;
        }

        button.correct {
            background-color: var(--success) !important;
            border-color: var(--success) !important;
            color: white;
        }

        button.wrong {
            background-color: var(--error) !important;
            border-color: var(--error) !important;
            color: white;
        }

        #result-screen {
            display: none;
        }

        .btn-next {
            margin-top: 2rem;
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: bold;
            display: none;
            margin-left: auto;
            margin-right: auto;
        }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="quiz-content">
        <div class="progress" id="progress">Вопрос 1 из 20</div>
        <h2 id="question">Текст вопроса</h2>
        <div class="options" id="options">
            </div>
        <button class="btn-next" id="next-btn" onclick="nextQuestion()">Далее</button>
    </div>

    <div id="result-screen">
        <h2>Тест завершен!</h2>
        <p id="score-text"></p>
        <button onclick="location.reload()" style="text-align: center; display: inline-block;">Пройти еще раз</button>
    </div>
</div>

<script>
    const questions = [
        {
            q: "Если бы ты мог помочь мне донести этот диван, было бы здорово.",
            a: [
                { t: "Si tu pourrais m'aider à porter ce canapé, ce serait génial.", c: false },
                { t: "Si tu pouvais m'aider à porter ce canapé, ce serait génial.", c: true },
                { t: "Si tu m'aiderais à porter ce canapé, ce sera génial.", c: false }
            ]
        },
        {
            q: "В гостиной много места, может, присядешь здесь?",
            a: [
                { t: "Il y a beaucoup de place dans le salon, si tu t'asseyais ici ?", c: true },
                { t: "Il y a beaucoup de lieux dans le salon, si tu t'assieds ici ?", c: false },
                { t: "Le salon est spacieux, si tu t'assoiras ici ?", c: false }
            ]
        },
        {
            q: "Мы знаем, что у тебя много работы, так может, мы придем тебе помочь в эти выходные?",
            a: [
                { t: "On sait que tu as beaucoup de travail, alors si nous viendrions t'aider ?", c: false },
                { t: "On sait que tu as du boulot, alors si nous venions t'aider ce week-end ?", c: true },
                { t: "Sachant ton travail, et si nous venons t'aider ce week-end ?", c: false }
            ]
        },
        {
            q: "Переезд запланирован на следующую субботу, рано утром.",
            a: [
                { t: "Le déménagement est prévu pour samedi prochain, de bonne heure.", c: true },
                { t: "La circulation est prévue pour samedi prochain, tôt le matin.", c: false },
                { t: "L'emménagement est fixé au samedi prochain matin.", c: false }
            ]
        },
        {
            q: "Мы наняли профессионального грузчика, чтобы перевезти пианино.",
            a: [
                { t: "Nous avons engagé un chargeur pour transporter le piano.", c: false },
                { t: "Nous avons loué un transporteur pour bouger le piano.", c: false },
                { t: "Nous avons engagé un déménageur professionnel pour transporter le piano.", c: true }
            ]
        },
        {
            q: "Я связался со специализированной компанией, чтобы арендовать оборудование.",
            a: [
                { t: "J'ai contacté une société spécialisée pour louer du matériel.", c: true },
                { t: "J'ai pris contact avec une boîte pour acheter l'équipement.", c: false },
                { t: "J'ai appelé une agence spéciale pour prêter du matériel.", c: false }
            ]
        },
        {
            q: "Сможет ли грузовик для переезда припарковаться на этой узкой улице?",
            a: [
                { t: "Est-ce qu'une voiture de transport pourra se garer dans cette ruelle ?", c: false },
                { t: "Est-ce qu'un camion de déménagement pourra se garer dans cette petite rue ?", c: true },
                { t: "Un poids lourd de déménagement saura-t-il stationner dans cette rue ?", c: false }
            ]
        },
        {
            q: "Я не знаю, что делать с этой старой мебелью, это очень громоздкие предметы.",
            a: [
                { t: "Je ne sais quoi faire de ces vieux meubles, ce sont des objets encombrants.", c: true },
                { t: "J'ignore que faire avec ces meubles, ce sont des choses lourdes.", c: false },
                { t: "Ces vieux meubles sont des objets gênants, je ne sais pas où les mettre.", c: false }
            ]
        },
        {
            q: "Я провожу вечер за тем, что упаковываю посуду в газетную бумагу.",
            a: [
                { t: "Je passe ma soirée à emballer la vaisselle dans du papier journal.", c: true },
                { t: "Je fais ma soirée en rangeant la vaisselle dans des journaux.", c: false },
                { t: "Je passe la soirée à empaqueter les assiettes avec du journal.", c: false }
            ]
        },
        {
            q: "Мне не терпится приехать в новую квартиру, чтобы наконец-то распаковать свои вещи.",
            a: [
                { t: "J'ai hâte d'arriver dans mon nouvel appart pour enfin déballer mes affaires.", c: true },
                { t: "Je suis pressé d'arriver chez moi pour ouvrir mes cartons.", c: false },
                { t: "Il me tarde d'arriver à l'appartement pour emballer mes affaires.", c: false }
            ]
        },
        {
            q: "Перед отъездом важно отсортировать всё, что находится на чердаке.",
            a: [
                { t: "Avant de partir, il faut ranger tout ce qui est dans la cave.", c: false },
                { t: "Avant de partir, il est important de trier tout ce qui se trouve dans le grenier.", c: true },
                { t: "Il est crucial de choisir les objets du grenier avant de déménager.", c: false }
            ]
        },
        {
            q: "Я собираюсь навести порядок (разобрать вещи) в своих бумагах, чтобы не брать лишнего.",
            a: [
                { t: "Je vais faire le tri dans mes papiers pour ne pas emporter de choses inutiles.", c: true },
                { t: "Je vais nettoyer mes papiers pour ne pas prendre de trucs en trop.", c: false },
                { t: "Je vais ordonner mes documents pour éviter les choses vaines.", c: false }
            ]
        },
        {
            q: "Мне осталось собрать еще одну коробку с кухонными принадлежностями.",
            a: [
                { t: "Il me reste encore à faire un carton pour les accessoires de cuisine.", c: true },
                { t: "Je dois encore remplir une boîte des outils de cuisine.", c: false },
                { t: "Il me manque de finir un paquet pour la cuisine.", c: false }
            ]
        },
        {
            q: "Для перевозки хрупких предметов я прибегну к специальной защите.",
            a: [
                { t: "Pour porter les trucs cassables, j'utiliserai des protections.", c: false },
                { t: "Pour transporter les objets fragiles, j'aurai recours à des protections spéciales.", c: true },
                { t: "J'utiliserai des recours de protection pour les objets délicats.", c: false }
            ]
        },
        {
            q: "Я свободен завтра, поэтому я помогу (подсоблю) своему брату.",
            a: [
                { t: "Je suis libre demain, donc je vais assister mon frère.", c: false },
                { t: "Demain je ne travaille pas, alors je vais aider mon frère.", c: false },
                { t: "Je suis libre demain, donc je vais donner un coup de main à mon frère.", c: true }
            ]
        },
        {
            q: "Мой сосед милый, он часто выручает меня, когда у меня возникают проблемы с ремонтом.",
            a: [
                { t: "Mon voisin est sympa, il vient souvent me dépanner quand j'ai un problème de bricolage.", c: true },
                { t: "Mon voisin est agréable, il me sauve souvent avec le bricolage.", c: false },
                { t: "Le voisin est gentil, il m'aide souvent avec mes soucis de réparation.", c: false }
            ]
        },
        {
            q: "Если буфет слишком тяжелый, я могу оказать тебе физическую помощь.",
            a: [
                { t: "Si le buffet est trop lourd, je peux te donner un coup de main.", c: false },
                { t: "Si le buffet est trop pesant, je peux t'aider avec ma force.", c: false },
                { t: "Si le buffet est trop lourd, je peux te prêter main-forte.", c: true }
            ]
        },
        {
            q: "Спасибо, что посидели с детьми, вы меня очень выручили!",
            a: [
                { t: "Merci pour les enfants, vous m'avez sauvé la vie !", c: false },
                { t: "Merci d'avoir gardé les enfants, vous me tirez une épine du pied !", c: true },
                { t: "Merci de veiller sur les gosses, vous m'enlevez un poids du dos.", c: false }
            ]
        },
        {
            q: "Если вам что-нибудь понадобится, я к вашим услугам.",
            a: [
                { t: "Si vous avez besoin de quoi que ce soit, je peux vous rendre service.", c: true },
                { t: "Si vous voulez quelque chose, je suis à votre service.", c: false },
                { t: "N'hésitez pas si vous avez besoin d'un service de ma part.", c: false }
            ]
        },
        {
            q: "Мне следовало бы попросить об одолжении Симона, так как у него очень вместительная машина.",
            a: [
                { t: "Je devrais demander un service à Simon car il a une voiture très large.", c: false },
                { t: "Je devrais demander une faveur à Simon car son auto est grande.", c: false },
                { t: "Je devrais demander un service à Simon car il a une voiture très spacieuse.", c: true }
            ]
        }
    ];

    let currentIdx = 0;
    let score = 0;

    function loadQuestion() {
        const qData = questions[currentIdx];
        document.getElementById("progress").innerText = `Вопрос ${currentIdx + 1} из ${questions.length}`;
        document.getElementById("question").innerText = qData.q;
        const optionsDiv = document.getElementById("options");
        optionsDiv.innerHTML = "";
        document.getElementById("next-btn").style.display = "none";

        qData.a.forEach(answer => {
            const btn = document.createElement("button");
            btn.innerText = answer.t;
            btn.onclick = () => selectAnswer(btn, answer.c);
            optionsDiv.appendChild(btn);
        });
    }

    function selectAnswer(btn, isCorrect) {
        const allButtons = document.querySelectorAll(".options button");
        allButtons.forEach(b => b.disabled = true);

        if (isCorrect) {
            btn.classList.add("correct");
            score++;
        } else {
            btn.classList.add("wrong");
            // Показать правильный
            allButtons.forEach((b, idx) => {
                if (questions[currentIdx].a[idx].c) b.classList.add("correct");
            });
        }
        document.getElementById("next-btn").style.display = "block";
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < questions.length) {
            loadQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        document.getElementById("quiz-content").style.display = "none";
        const resultScreen = document.getElementById("result-screen");
        resultScreen.style.display = "block";
        document.getElementById("score-text").innerText = `Вы ответили правильно на ${score} из ${questions.length} вопросов.`;
    }

    loadQuestion();
</script>

</body>
</html>
