        const optionsDiv = document.getElementById("options");
        optionsDiv.innerHTML = "";
        document.getElementById("next-btn").style.display = "none";

        qData.a.forEach(answer => {
            const btn = document.createElement("button");
            btn.innerText = answer.t;
            btn.onclick = () => selectAnswer(btn, answer.c);
            optionsDiv.appendChild(btn);
        });
    }

    function selectAnswer(btn, isCorrect) {
        const allButtons = document.querySelectorAll(".options button");
        allButtons.forEach(b => b.disabled = true);

        if (isCorrect) {
            btn.classList.add("correct");
            score++;
        } else {
            btn.classList.add("wrong");
            // Показать правильный
            allButtons.forEach((b, idx) => {
                if (questions[currentIdx].a[idx].c) b.classList.add("correct");
            });
        }
        document.getElementById("next-btn").style.display = "block";
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < questions.length) {
            loadQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        document.getElementById("quiz-content").style.display = "none";
        const resultScreen = document.getElementById("result-screen");
        resultScreen.style.display = "block";
        document.getElementById("score-text").innerText = `Вы ответили правильно на ${score} из ${questions.length} вопросов.`;
    }

    loadQuestion();
</script>

</body>
</html>
