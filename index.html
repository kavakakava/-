            letter-spacing: 1px;
        }

            font-size: 1.25rem;
            line-height: 1.6;
            margin-bottom: 2rem;
            font-weight: 600;
            color: #2c3e50;
        }

        .options {
            display: grid;
            gap: 15px;
        }

        button.option-btn {
            background: #fff;
            border: 1px solid var(--border);
            padding: 16px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            text-align: left;
            line-height: 1.4;
        }

        button.option-btn:hover:not(:disabled) {
            background-color: #f9f9ff;
            border-color: var(--accent);
            transform: translateY(-1px);
        }

        button.correct {
            background-color: var(--success) !important;
            border-color: var(--success) !important;
            color: white;
        }

        button.wrong {
            background-color: var(--error) !important;
            border-color: var(--error) !important;
            color: white;
        }

        .footer {
            margin-top: 2rem;
            text-align: right;
            min-height: 50px;
        }

        .btn-next {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            display: none;
        }

        #result-screen {
            display: none;
            text-align: center;
        }

        .score-circle {
            font-size: 3rem;
            font-weight: bold;
            color: var(--accent);
            margin: 20px 0;

                { t: "Je devrais demander un service à Simon car il a une voiture très large.", c: false },
                { t: "Je devrais demander une faveur à Simon car son auto est grande.", c: false },
                { t: "Je devrais demander un service à Simon car il a une voiture très spacieuse.", c: true }
            ]
        }
    ];

    let currentIdx = 0;
    let score = 0;

    function loadQuestion() {
        const qData = questions[currentIdx];
        document.getElementById("progress").innerText = `Question ${currentIdx + 1} / ${questions.length}`;
        document.getElementById("question").innerText = qData.q;
        const optionsDiv = document.getElementById("options");
        optionsDiv.innerHTML = "";
        document.getElementById("next-btn").style.display = "none";

        // Клонируем массив ответов для перемешивания
        const shuffledAnswers = [...qData.a].sort(() => Math.random() - 0.5);
        
        shuffledAnswers.forEach(answer => {
            const btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = answer.t;
            btn.onclick = () => selectAnswer(btn, answer.c);
            optionsDiv.appendChild(btn);
        });
    }

    function selectAnswer(btn, isCorrect) {
        const allButtons = document.querySelectorAll(".option-btn");
        allButtons.forEach(b => b.disabled = true);

        if (isCorrect) {
            btn.classList.add("correct");
            score++;
        } else {
            btn.classList.add("wrong");
            allButtons.forEach((b) => {
                const text = b.innerText;
                const originalAnswer = questions[currentIdx].a.find(ans => ans.t === text);
                if (originalAnswer.c) b.classList.add("correct");
            });
        }
        document.getElementById("next-btn").style.display = "block";
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < questions.length) {
            loadQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        document.getElementById("quiz-content").style.display = "none";
        document.getElementById("result-screen").style.display = "block";
        document.getElementById("final-score").innerText = `${score} / ${questions.length}`;
        
        let msg = "";
        const percentage = (score / questions.length) * 100;

        if(percentage === 100) msg = "Parfait ! Vous maîtrisez parfaitement le lexique de l'entraide.";
        else if(percentage > 80) msg = "Très bien ! Votre niveau B2 est solide.";
        else if(percentage > 50) msg = "Pas mal, mais n'hésitez pas à revoir les nuances synonymiques.";
        else msg = "Continuez vos efforts pour enrichir votre vocabulaire !";

        document.getElementById("result-message").innerText = msg;
    }

    loadQuestion();
</script>

</body>
</html>
